# Automated npm publish on GitHub release.
#
# Setup (one-time):
#   1. Generate an npm Automation Access Token (npm UI -> Access Tokens -> Generate New -> Automation)
#   2. Add it as a GitHub secret named NPM_TOKEN in this repo's settings
#   3. Bump package.json version, commit, push
#   4. Create a GitHub release via `gh release create vX.Y.Z`
#
# This workflow then:
#   - Verifies the package.json version matches the release tag
#   - Runs tests
#   - Publishes to npm with provenance

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          TAG_VERSION="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing v$PKG_VERSION"

      - name: Smoke test
        run: |
          node bin/aeo-audit.js --version
          node bin/aeo-audit.js --help

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
